<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E Relations</title>
    <link rel="stylesheet" href="./styles.css?v=10">
  </head>
  <body>
    <!-- 画面上部: ブランド名、主要操作、依存接続時の入力設定をまとめるヘッダーです。 -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">ER</div>
        <div>
          <h1>E Relations</h1>
          <p>EPC工程依存関係エディタ</p>
        </div>
      </div>

      <!-- 主要操作: タスク追加、依存接続、自動整列、初期化を実行します。 -->
      <div class="actions">
        <button id="addTask" class="action-button" title="タスクを追加" aria-label="タスクを追加">
          <span class="action-icon">+</span>
          <span>タスク追加</span>
        </button>
        <button id="linkMode" class="action-button" title="依存線の接続モードを切り替え" aria-label="依存線の接続モードを切り替え">
          <span class="action-icon">↘</span>
          <span>依存接続</span>
        </button>
        <button id="autoLayout" class="action-button" title="タスクを自動整列" aria-label="タスクを自動整列">
          <span class="action-icon">⇄</span>
          <span>自動整列</span>
        </button>
        <button id="undoAction" class="action-button utility" title="タスク・依存線の編集を元に戻す" aria-label="タスク・依存線の編集を元に戻す" disabled>
          <span class="action-icon">↶</span>
          <span>編集戻す</span>
        </button>
        <button id="redoAction" class="action-button utility" title="タスク・依存線の編集をやり直す" aria-label="タスク・依存線の編集をやり直す" disabled>
          <span class="action-icon">↷</span>
          <span>編集進む</span>
        </button>
        <button id="exportJson" class="action-button file-action" title="工程JSONを書き出す" aria-label="工程JSONを書き出す">
          <span class="action-icon">⇩</span>
          <span>JSON出力</span>
        </button>
        <button id="importJson" class="action-button file-action" title="工程JSONを取り込む" aria-label="工程JSONを取り込む">
          <span class="action-icon">⇧</span>
          <span>JSON取込</span>
        </button>
        <button id="resetData" class="action-button danger" title="サンプル工程に戻す" aria-label="サンプル工程に戻す">
          <span class="action-icon">↺</span>
          <span>初期化</span>
        </button>
        <input id="importFile" type="file" accept="application/json,.json" hidden>
      </div>

      <!-- 依存接続モード中だけ表示する、依存種別、ラグ、線ラベルの設定です。 -->
      <div class="link-settings" id="linkSettings">
        <label>依存種別
          <select id="relationType">
            <option value="FS">FS 完了→開始</option>
            <option value="SS">SS 開始→開始</option>
            <option value="FF">FF 完了→完了</option>
            <option value="SF">SF 開始→完了</option>
          </select>
        </label>
        <label>ラグ(日)
          <input id="lagDays" type="number" value="0" min="-30" max="90">
        </label>
        <label>線ラベル
          <input id="edgeLabel" class="edge-label-input" type="text" maxlength="30" placeholder="IFC図・制約">
        </label>
      </div>
    </header>

    <!-- 画面本体: 左の集計/フィルター、中央の作業ビュー、右の詳細編集で構成します。 -->
    <main class="layout">
      <!-- 左サイドバー: 工程概要、操作ガイド、領域フィルター、注目タスクを表示します。 -->
      <aside class="sidebar">
        <section>
          <div class="eyebrow">概要</div>
          <h2>Greenfield Process Unit</h2>
          <div class="metrics" id="metrics"></div>
        </section>

        <section class="guide-section">
          <div class="eyebrow">操作ガイド</div>
          <div class="guide-list">
            <div class="guide-step">
              <span class="guide-index">1</span>
              <div>
                <strong>追加・編集</strong>
                <span>タスク追加後、右の詳細で編集。カードはドラッグで配置。</span>
              </div>
            </div>
            <div class="guide-step">
              <span class="guide-index">2</span>
              <div>
                <strong>依存をつなぐ</strong>
                <span>依存接続を押し、先行→後続の順にクリック。</span>
              </div>
            </div>
            <div class="guide-step">
              <span class="guide-index">3</span>
              <div>
                <strong>線を直す</strong>
                <span>線をクリックし、右の詳細で修正・削除。</span>
              </div>
            </div>
            <div class="guide-step">
              <span class="guide-index">4</span>
              <div>
                <strong>見方を変える</strong>
                <span>タブ、検索、領域フィルターで絞り込み。</span>
              </div>
            </div>
            <div class="guide-step">
              <span class="guide-index">5</span>
              <div>
                <strong>安全に試す</strong>
                <span>編集戻す/進む、JSON出力/取込で復旧。</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <div class="eyebrow">領域</div>
          <div class="filters" id="filters"></div>
        </section>

        <section>
          <div class="eyebrow">注目</div>
          <div class="focus-list" id="focusList"></div>
        </section>
      </aside>

      <!-- 中央ステージ: ネットワーク、ガント、表をタブで切り替える主作業領域です。 -->
      <section class="stage">
        <div class="stage-head">
          <div class="tabs">
            <button class="tab active" data-view="network">ネットワーク</button>
            <button class="tab" data-view="gantt">ガント</button>
            <button class="tab" data-view="table">表</button>
          </div>
          <input id="search" class="search" type="search" placeholder="コード・タスク・担当で検索">
        </div>

        <div class="status" id="status">Ready</div>

        <!-- ネットワークビュー: タスクノードと依存線を直接操作します。 -->
        <section class="view active" id="networkView">
          <div class="network-toolbar">
            <button id="focusSelected" class="network-tool-button" type="button" title="選択中のタスクへ移動" aria-label="選択中のタスクへ移動">
              <span class="tool-icon">◎</span>
              <span>選択へ移動</span>
            </button>
            <div class="density-toggle" aria-label="表示密度">
              <button class="density-option active" type="button" data-density="standard" aria-pressed="true">標準</button>
              <button class="density-option" type="button" data-density="compact" aria-pressed="false">コンパクト</button>
            </div>
            <div id="edgeSummary" class="edge-summary">依存線をクリックすると詳細を表示</div>
          </div>
          <div class="network" id="network">
            <div id="areaBands" class="area-bands"></div>
            <svg id="edges" class="edges"></svg>
            <div id="nodes" class="nodes"></div>
          </div>
        </section>

        <!-- ガントビュー: 計算された最早開始日と期間を横棒で確認します。 -->
        <section class="view" id="ganttView">
          <div id="gantt" class="gantt"></div>
        </section>

        <!-- 表ビュー: タスク属性を一覧で編集します。 -->
        <section class="view" id="tableView">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>コード</th>
                  <th>タスク</th>
                  <th>領域</th>
                  <th>状態</th>
                  <th>Lv</th>
                  <th>期間</th>
                  <th>進捗</th>
                  <th>予定完了</th>
                  <th>先行</th>
                  <th>余裕</th>
                </tr>
              </thead>
              <tbody id="taskTable"></tbody>
            </table>
          </div>
        </section>
      </section>

      <!-- 右ペイン: 選択タスクと接続依存線の詳細を編集します。 -->
      <aside class="inspector" id="inspector"></aside>
    </main>

    <script src="./app.js?v=10"></script>
  </body>
</html>
